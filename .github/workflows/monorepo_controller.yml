name: Monorepo Diff Controller
on:
  push:
    branches: [ 'main' ]

jobs:
  find-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Monorepo controller
        id: controller
        uses: cloudposse/github-action-monorepo-random-controller@0.1.1
        with:
          dir: ./

    outputs:
      applications: ${{ steps.controller.outputs.apps }}
      changes: ${{ steps.controller.outputs.changes }}
      no-changes: ${{ steps.controller.outputs.no-changes }}

  ci:
    runs-on: ubuntu-latest
    needs: [find-changes]
    if: ${{ needs.find-changes.outputs.changes != '[]'  }}
    strategy:
      matrix:
        application: ${{ fromJson(needs.find-changes.outputs.changes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print application name
        run: echo "Application ${{ matrix.application }}"

