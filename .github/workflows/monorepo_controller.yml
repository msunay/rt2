      #   with:
      #     registry: registry.hub.docker.com
      #     organization: ${{ github.event.repository.owner.login }}
      #     repository: ${{ github.event.repository.name }}/${{ matrix.application }}
      #     workdir: ./applications/${{ matrix.application }}